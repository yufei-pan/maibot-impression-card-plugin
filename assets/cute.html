<!--
  印象卡片模板：可爱贴纸（cute） · T 字型布局
  占位符与 SVG 着色类同 parchment.html，请勿删除被引用的 class。
-->
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: transparent;
    font-family: "Noto Sans SC", "PingFang SC", "Microsoft YaHei", "Source Han Sans SC", sans-serif;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }
  svg text {
    font-family: "Noto Sans SC", "PingFang SC", "Microsoft YaHei", "Source Han Sans SC", sans-serif;
  }

  #card {
    width: 920px;
    display: flex; flex-direction: column;
    border-radius: 28px; overflow: visible; color: #6b4a5a;
    background:
      radial-gradient(circle at 18% 12%, rgba(255,255,255,0.7), rgba(0,0,0,0) 44%),
      linear-gradient(150deg, #ffe9f3 0%, #ffe0ee 50%, #fff0d9 100%);
    border: 5px solid #ffb3d1;
    box-shadow: inset 0 0 50px rgba(255,170,210,0.35);
  }

  .titlebar { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; gap: 14px; padding: 14px 22px 8px; }
  .tb-left { display: flex; align-items: center; gap: 14px; min-width: 0; }
  .tb-center {
    text-align: center; font-size: 25px; font-weight: 800; letter-spacing: 1px;
    color: #ff6fa5; text-shadow: 0 1px 0 rgba(255,255,255,0.7); white-space: nowrap;
  }
  .tb-right { text-align: right; }

  .avatar {
    width: 72px; height: 72px; border-radius: 50%; object-fit: cover;
    border: 4px solid #ffb3d1; box-shadow: 0 3px 10px rgba(255,150,195,0.5); flex-shrink: 0;
  }
  .avatar-placeholder {
    display: flex; align-items: center; justify-content: center;
    font-size: 32px; font-weight: 800; color: #fff;
    background: linear-gradient(135deg, #ffa6c9, #ff8fb8);
  }
  .names { display: flex; flex-direction: column; gap: 1px; min-width: 0; }
  .nickname { font-size: 23px; font-weight: 800; color: #e8568b; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .alias { font-size: 15px; color: #ff8fb8; }
  .cardname { font-size: 12px; color: #c89aae; white-space: normal; word-break: break-all; }

  .score-label { font-size: 13px; color: #d96a98; letter-spacing: 1px; }
  .score-value { font-size: 40px; font-weight: 800; color: #e8568b; line-height: 1.05; }
  .score-unit { font-size: 15px; font-weight: 600; color: #ff8fb8; margin-left: 4px; }

  .gauge { padding: 0 8px 8px; overflow: visible; }
  .gauge svg { width: 100%; height: auto; display: block; overflow: visible; }

  .body { display: flex; border-top: 3px dotted rgba(255,150,195,0.7); border-radius: 0 0 22px 22px; overflow: visible; align-items: flex-start; }
  .left {
    width: 55%;
    padding: 14px 4px 8px;
    display: flex; flex-direction: column; align-items: stretch; justify-content: flex-start;
    gap: 4px;
    border-right: 3px dotted rgba(255,150,195,0.7);
  }
  .left .radar { width: 100%; overflow: visible; flex-shrink: 0; display: flex; justify-content: center; padding-top: 4px; }
  .left .radar svg { display: block; height: 290px; width: auto; max-width: 100%; overflow: visible; }
  .right { flex: 1; padding: 12px 20px 16px; display: flex; flex-direction: column; }
  .desc-title { font-size: 16px; font-weight: 700; color: #ff6fa5; margin-bottom: 6px; }
  .desc {
    min-height: 0;
    font-size: 17px; line-height: 1.72; color: #6b4a5a; white-space: pre-wrap;
    background: rgba(255,255,255,0.6); border: 2px solid rgba(255,170,210,0.6);
    border-radius: 16px; padding: 12px 14px;
  }

  .dim-legend { display: flex; flex-wrap: wrap; justify-content: center; gap: 5px 8px; margin-top: 4px; flex-shrink: 0; }
  .legend-item {
    display: flex; gap: 6px; align-items: baseline; font-size: 13px;
    background: rgba(255,255,255,0.7); border: 2px solid rgba(255,170,210,0.6);
    border-radius: 12px; padding: 2px 8px;
  }
  .legend-name { color: #d96a98; }
  .legend-val { font-weight: 800; color: #e8568b; }

  /* —— SVG：雷达 —— */
  .grid { fill: none; stroke: rgba(255,150,195,0.4); stroke-width: 1; }
  .axis { stroke: rgba(255,150,195,0.35); stroke-width: 1; }
  .radar-sector-pos { fill: rgba(255,150,195,0.40); }
  .radar-sector-neg { fill: rgba(154,134,255,0.45); }
  .radar-sector-over { fill: rgba(255,207,90,0.42); }
  .radar-stroke { stroke: #ff7fb0; stroke-width: 2.5; }
  .radar-vertex { fill: #e8568b; }
  .axis-label { fill: #e8568b; font-size: 18px; font-weight: 700; }
  .axis-value { fill: #ff8fb8; font-size: 15px; font-weight: 700; }

  /* —— SVG：量表条 —— */
  .gauge-bar-track { fill: rgba(255,150,195,0.25); }
  .gauge-bar-fill { fill: #ff7fb0; }
  .gauge-bar-over { fill: #ffcf5a; }
  .gauge-bar-neg { fill: #9a86ff; }
  .gauge-bar-knob { fill: #e8568b; stroke: #fff; stroke-width: 2; }
</style>

<div id="card">
  <div class="titlebar">
    <div class="tb-left">
      {avatar_html}
      <div class="names">
        <div class="nickname">{nickname}</div>
        {alias_block}
        {cardname_block}
      </div>
    </div>
    <div class="tb-center">♡ {card_title} ♡</div>
    <div class="tb-right">
      <div class="score-label">{total_label}</div>
      <div class="score-value">{total_value}</div>
    </div>
  </div>

  <div class="gauge">{gauge_bar}</div>

  <div class="body">
    <div class="left">
      <div class="radar">{radar_svg}</div>
      {legend_html}
    </div>
    <div class="right">
      <div class="desc-title">{impression_title}</div>
      <div class="desc">{description}</div>
    </div>
  </div>
</div>
