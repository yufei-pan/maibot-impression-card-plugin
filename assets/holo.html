<!--
  印象卡片模板：全息科技（holo） · T 字型布局
  占位符与 SVG 着色类同 parchment.html，请勿删除被引用的 class。
-->
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: transparent;
    font-family: "Noto Sans SC", "PingFang SC", "Microsoft YaHei", "Source Han Sans SC", sans-serif;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }
  svg text {
    font-family: "Noto Sans SC", "PingFang SC", "Microsoft YaHei", "Source Han Sans SC", sans-serif;
  }

  #card {
    width: 920px;
    display: flex; flex-direction: column;
    border-radius: 20px; overflow: visible; color: #d7f6ff;
    background:
      radial-gradient(circle at 15% 10%, rgba(0,200,255,0.18), rgba(0,0,0,0) 42%),
      radial-gradient(circle at 90% 95%, rgba(180,60,255,0.22), rgba(0,0,0,0) 48%),
      linear-gradient(150deg, #0b1226 0%, #111a38 55%, #0a1730 100%);
    border: 2px solid rgba(80,220,255,0.55);
    box-shadow: inset 0 0 70px rgba(40,160,255,0.18), 0 0 24px rgba(60,200,255,0.25);
  }

  .titlebar { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; gap: 16px; padding: 18px 26px 12px; }
  .tb-left { display: flex; align-items: center; gap: 14px; min-width: 0; }
  .tb-center {
    text-align: center; font-size: 24px; font-weight: 800; letter-spacing: 3px;
    color: #74e9ff; text-shadow: 0 0 12px rgba(80,220,255,0.7); white-space: nowrap;
  }
  .tb-right { text-align: right; }

  .avatar {
    width: 72px; height: 72px; border-radius: 14px; object-fit: cover;
    border: 2px solid rgba(90,220,255,0.8); box-shadow: 0 0 16px rgba(80,220,255,0.5); flex-shrink: 0;
  }
  .avatar-placeholder {
    display: flex; align-items: center; justify-content: center;
    font-size: 32px; font-weight: 800; color: #08243a;
    background: linear-gradient(135deg, #5ad7ff, #7a6bff);
  }
  .names { display: flex; flex-direction: column; gap: 1px; min-width: 0; }
  .nickname { font-size: 23px; font-weight: 800; color: #eaffff; text-shadow: 0 0 10px rgba(90,220,255,0.6); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .alias { font-size: 15px; color: #9fdcff; }
  .cardname { font-size: 12px; color: #7fb8d8; white-space: normal; word-break: break-all; }

  .score-label { font-size: 13px; color: #9fdcff; letter-spacing: 1px; }
  .score-value { font-size: 40px; font-weight: 800; color: #74e9ff; line-height: 1.05; text-shadow: 0 0 14px rgba(80,220,255,0.6); }
  .score-unit { font-size: 15px; font-weight: 600; color: #9fdcff; margin-left: 4px; }

  .gauge { padding: 2px 8px 14px; overflow: visible; }
  .gauge svg { width: 100%; height: auto; display: block; overflow: visible; }

  .body { display: flex; border-top: 1px solid rgba(90,220,255,0.35); border-radius: 0 0 18px 18px; overflow: visible; }
  .left {
    width: 45%; padding: 18px 16px 22px;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    border-right: 1px solid rgba(90,220,255,0.3);
  }
  .left .radar { width: 100%; max-width: 340px; overflow: visible; }
  .left .radar svg { display: block; width: 100%; height: auto; overflow: visible; }
  .right { flex: 1; padding: 20px 26px 24px; display: flex; flex-direction: column; }

  .desc-title { font-size: 16px; font-weight: 700; color: #74e9ff; margin-bottom: 8px; letter-spacing: 1px; }
  .desc {
    flex: 1; min-height: 240px; font-size: 18px; line-height: 1.85; color: #d7f6ff; white-space: pre-wrap;
    background: rgba(20,40,75,0.55); border: 1px solid rgba(90,220,255,0.3);
    border-radius: 12px; padding: 16px 18px; box-shadow: inset 0 0 24px rgba(40,160,255,0.12);
  }

  .dim-legend { display: flex; flex-wrap: wrap; justify-content: center; gap: 6px 10px; margin-top: 12px; }
  .legend-item {
    display: flex; gap: 6px; align-items: baseline; font-size: 13px;
    background: rgba(20,40,75,0.6); border: 1px solid rgba(90,220,255,0.3);
    border-radius: 8px; padding: 2px 8px;
  }
  .legend-name { color: #9fdcff; }
  .legend-val { font-weight: 800; color: #74e9ff; }

  /* —— SVG：雷达 —— */
  .grid { fill: none; stroke: rgba(90,220,255,0.22); stroke-width: 1; }
  .axis { stroke: rgba(90,220,255,0.2); stroke-width: 1; }
  .radar-sector-pos { fill: rgba(90,220,255,0.30); }
  .radar-sector-neg { fill: rgba(255,90,138,0.38); }
  .radar-sector-over { fill: rgba(180,107,255,0.38); }
  .radar-stroke { stroke: #5ad7ff; stroke-width: 2.5; }
  .radar-vertex { fill: #aef0ff; }
  .axis-label { fill: #d7f6ff; font-size: 15px; font-weight: 700; }
  .axis-value { fill: #74e9ff; font-size: 13px; font-weight: 700; }

  /* —— SVG：量表条 —— */
  .gauge-bar-track { fill: rgba(90,220,255,0.16); }
  .gauge-bar-fill { fill: #5ad7ff; }
  .gauge-bar-over { fill: #b46bff; }
  .gauge-bar-neg { fill: #ff5a8a; }
  .gauge-bar-knob { fill: #eaffff; stroke: #5ad7ff; stroke-width: 2; }
</style>

<div id="card">
  <div class="titlebar">
    <div class="tb-left">
      {avatar_html}
      <div class="names">
        <div class="nickname">{nickname}</div>
        {alias_block}
        {cardname_block}
      </div>
    </div>
    <div class="tb-center">◈ {card_title} ◈</div>
    <div class="tb-right">
      <div class="score-label">{total_label}</div>
      <div class="score-value">{total_value}</div>
    </div>
  </div>

  <div class="gauge">{gauge_bar}</div>

  <div class="body">
    <div class="left">
      <div class="radar">{radar_svg}</div>
      {legend_html}
    </div>
    <div class="right">
      <div class="desc-title">{impression_title}</div>
      <div class="desc">{description}</div>
    </div>
  </div>
</div>
