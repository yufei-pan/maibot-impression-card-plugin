<!--
  印象卡片模板：羊皮纸（parchment） · T 字型布局
  可用占位符：
    {card_title} {avatar_html} {nickname} {alias_block} {cardname_block}
    {bot_name} {impression_title}
    {total_label} {total_value} {gauge_bar} {radar_svg} {legend_html} {description}
  SVG 着色类（请勿删除，由插件生成的 SVG 引用）：
    grid / axis / radar-sector-pos / radar-sector-neg / radar-sector-over
    radar-stroke / radar-vertex / axis-label / axis-value
    gauge-bar-track / gauge-bar-fill / gauge-bar-neg / gauge-bar-over / gauge-bar-knob
-->
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: transparent;
    font-family: "Noto Sans SC", "PingFang SC", "Microsoft YaHei", "Source Han Sans SC", sans-serif;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }
  svg text {
    font-family: "Noto Sans SC", "PingFang SC", "Microsoft YaHei", "Source Han Sans SC", sans-serif;
  }

  #card {
    width: 920px;
    display: flex;
    flex-direction: column;
    border-radius: 22px;
    overflow: visible;
    color: #4a3416;
    background:
      radial-gradient(circle at 20% 12%, rgba(255,250,235,0.7), rgba(0,0,0,0) 45%),
      radial-gradient(circle at 85% 92%, rgba(160,120,70,0.25), rgba(0,0,0,0) 52%),
      linear-gradient(135deg, #f3e3c0 0%, #e7cf9f 55%, #dcbe85 100%);
    border: 6px solid #8a5a2b;
    box-shadow: inset 0 0 60px rgba(120,80,30,0.35);
  }

  /* —— 顶部 title bar（T 的横） —— */
  .titlebar {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    gap: 14px;
    padding: 14px 22px 8px;
  }
  .tb-left { display: flex; align-items: center; gap: 14px; min-width: 0; }
  .tb-center {
    text-align: center; font-size: 25px; font-weight: 800; letter-spacing: 2px;
    color: #7a4a1e; text-shadow: 0 1px 0 rgba(255,255,255,0.5); white-space: nowrap;
  }
  .tb-right { text-align: right; }

  .avatar {
    width: 72px; height: 72px; border-radius: 50%;
    object-fit: cover; border: 3px solid #8a5a2b;
    box-shadow: 0 2px 8px rgba(80,50,20,0.4); flex-shrink: 0;
  }
  .avatar-placeholder {
    display: flex; align-items: center; justify-content: center;
    font-size: 32px; font-weight: 800; color: #fff;
    background: linear-gradient(135deg, #b07a3c, #8a5a2b);
  }
  .names { display: flex; flex-direction: column; gap: 1px; min-width: 0; }
  .nickname { font-size: 23px; font-weight: 800; color: #5a3a14; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .alias { font-size: 15px; color: #9a6a32; font-style: italic; }
  .cardname { font-size: 12px; color: #a07a4a; white-space: normal; word-break: break-all; }

  .score-label { font-size: 13px; color: #8a5a2b; letter-spacing: 1px; }
  .score-value { font-size: 40px; font-weight: 800; color: #6a3a10; line-height: 1.05; }
  .score-unit { font-size: 15px; font-weight: 600; color: #9a6a32; margin-left: 4px; }

  /* —— 量表条 —— */
  .gauge { padding: 0 8px 8px; overflow: visible; }
  .gauge svg { width: 100%; height: auto; display: block; overflow: visible; }

  /* —— 下方主区域（T 的竖，左右两块） —— */
  .body {
    display: flex;
    border-top: 2px solid rgba(138,90,43,0.5);
    border-radius: 0 0 16px 16px;
    overflow: visible;
    align-items: flex-start;
  }
  .left {
    width: 55%;
    padding: 14px 4px 8px;
    display: flex; flex-direction: column; align-items: stretch; justify-content: flex-start;
    gap: 4px;
    border-right: 3px dashed rgba(138,90,43,0.55);
  }
  .left .radar { width: 100%; overflow: visible; flex-shrink: 0; display: flex; justify-content: center; padding-top: 4px; }
  .left .radar svg { display: block; height: 290px; width: auto; max-width: 100%; overflow: visible; }
  .right { flex: 1; padding: 12px 20px 16px; display: flex; flex-direction: column; }

  .desc-title { font-size: 16px; font-weight: 700; color: #7a4a1e; margin-bottom: 6px; }
  .desc {
    min-height: 0;
    font-size: 17px; line-height: 1.72; color: #4a3416; white-space: pre-wrap;
    background: rgba(255,250,238,0.55); border: 1px solid rgba(138,90,43,0.35);
    border-radius: 12px; padding: 12px 14px;
  }

  .dim-legend { display: flex; flex-wrap: wrap; justify-content: center; gap: 5px 8px; margin-top: 4px; flex-shrink: 0; }
  .legend-item {
    display: flex; gap: 6px; align-items: baseline; font-size: 13px;
    background: rgba(255,250,238,0.6); border: 1px solid rgba(138,90,43,0.3);
    border-radius: 8px; padding: 2px 8px;
  }
  .legend-name { color: #7a4a1e; }
  .legend-val { font-weight: 800; color: #6a3a10; }

  /* —— SVG：雷达 —— */
  .grid { fill: none; stroke: rgba(138,90,43,0.35); stroke-width: 1; }
  .axis { stroke: rgba(138,90,43,0.3); stroke-width: 1; }
  .radar-sector-pos { fill: rgba(192,120,52,0.38); }
  .radar-sector-neg { fill: rgba(181,58,43,0.42); }
  .radar-sector-over { fill: rgba(224,168,58,0.40); }
  .radar-stroke { stroke: #b5651d; stroke-width: 2.5; }
  .radar-vertex { fill: #8a4a18; }
  .axis-label { fill: #6a3a10; font-size: 18px; font-weight: 700; }
  .axis-value { fill: #9a6a32; font-size: 15px; font-weight: 700; }

  /* —— SVG：量表条 —— */
  .gauge-bar-track { fill: rgba(120,80,30,0.18); }
  .gauge-bar-fill { fill: #c8861f; }
  .gauge-bar-over { fill: #e0a83a; }
  .gauge-bar-neg { fill: #b53a2b; }
  .gauge-bar-knob { fill: #6a3a10; stroke: #fff4df; stroke-width: 2; }
</style>

<div id="card">
  <div class="titlebar">
    <div class="tb-left">
      {avatar_html}
      <div class="names">
        <div class="nickname">{nickname}</div>
        {alias_block}
        {cardname_block}
      </div>
    </div>
    <div class="tb-center">⚜ {card_title} ⚜</div>
    <div class="tb-right">
      <div class="score-label">{total_label}</div>
      <div class="score-value">{total_value}</div>
    </div>
  </div>

  <div class="gauge">{gauge_bar}</div>

  <div class="body">
    <div class="left">
      <div class="radar">{radar_svg}</div>
      {legend_html}
    </div>
    <div class="right">
      <div class="desc-title">{impression_title}</div>
      <div class="desc">{description}</div>
    </div>
  </div>
</div>
